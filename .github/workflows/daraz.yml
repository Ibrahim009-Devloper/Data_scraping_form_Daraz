name: Automation Exercise

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-html
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install FFmpeg and Xvfb
      run: sudo apt-get update && sudo apt-get install -y ffmpeg xvfb

    - name: Run Pytest with Virtual Display and Video
      # সব কাজ একটি ব্লকে করতে হবে যেন DISPLAY ভ্যারিয়েবলটি হারিয়ে না যায়
      run: |
        # ১. ভার্চুয়াল মনিটর স্টার্ট
        Xvfb :99 -screen 0 1920x1080x24 &
        export DISPLAY=:99
        sleep 3
        
        # ২. ভিডিও রেকর্ডিং স্টার্ট (ব্যাকগ্রাউন্ডে)
        ffmpeg -f x11grab -video_size 1920x1080 -i :99 -codec:v libx264 -pix_fmt yuv420p test_execution.mp4 &
        sleep 2
        
        # ৩. টেস্ট রান (ফেইল করলেও যেন ভিডিও সেভ হয় তাই || true)
        pytest -v -s --html=./reports/report.html || true
        
        # ৪. রেকর্ডিং বন্ধ করা
        pkill ffmpeg
        sleep 2

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: html-report
        path: ./reports/

    - name: Upload Video on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: execution-video
        path: ./test_execution.mp4

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Dummy Deployment
        run: |
          echo "🚀 CI Passed! Starting Deployment..."
          sleep 3
          echo "✅ Deployment Successful (Dummy CD)"