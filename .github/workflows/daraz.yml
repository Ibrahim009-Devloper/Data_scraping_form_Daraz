name: Data scraping from daraz

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4 # v4 ব্যবহার করা ভালো
      with:
        python-version: "3.10"

    - name: Install Linux Dependencies (Virtual Screen)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxi6 libgconf-2-4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pandas openpyxl selenium selenium-wire undetected-chromedriver
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run tests with Virtual Screen (Xvfb)
      run: |
        # xvfb-run কমান্ডটি একটি ভার্চুয়াল ডিসপ্লে তৈরি করবে (Screen 0, 1280x1024)
        xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pytest -v -s
